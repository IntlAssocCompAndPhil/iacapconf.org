<!-- Self-contained OpenStreetMap/Leaflet map: Nichol's Hall (venue) + The Oread (hotel). -->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
  crossorigin="" />

<div
  id="iacap-venue-map"
  role="application"
  aria-label="Map of Lawrence, Kansas showing Nichol's Hall (the conference venue) and The Oread Hotel, with the walking route between them."
  style="height: 460px; width: 100%; max-width: 820px; margin: 1rem auto; border-radius: 8px; border: 1px solid #ccc;">
  <noscript>
    <p>This interactive map needs JavaScript. The two locations are
    <a href="https://www.openstreetmap.org/?mlat=38.95218&amp;mlon=-95.26411#map=15/38.9572/-95.2533">Nichol's Hall (conference venue) and The Oread Hotel on OpenStreetMap</a>,
    about a 2.6&nbsp;km / 35&nbsp;minute walk apart.</p>
  </noscript>
</div>

<p style="max-width: 820px; margin: 0.25rem auto 1.25rem; font-size: 0.9em; color: #555; text-align: center;">
  <span style="color:#E8000D; font-weight:700;">&#9679;</span> Nichol&#39;s Hall (conference venue) &nbsp;&middot;&nbsp;
  <span style="color:#0051BA; font-weight:700;">&#9679;</span> The Oread Hotel &nbsp;&middot;&nbsp;
  dashed line = approximate walking route (&#8776;&nbsp;2.6&nbsp;km, ~35&nbsp;min).
  Map data &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors.
</p>

<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin=""></script>
<script>
(function () {
  var el = document.getElementById('iacap-venue-map');
  if (!el || el.dataset.init === '1' || typeof L === 'undefined') { return; }

  function build() {
    el.dataset.init = '1';

    var VENUE = [38.95218, -95.26411];   // Nichol's Hall, 2335 Irving Hill Rd
    var HOTEL = [38.96243, -95.24255];   // The Oread, 1200 Oread Ave
    var ROUTE = [[38.96255,-95.24276],[38.96255,-95.24284],[38.96236,-95.24285],[38.96236,-95.243],[38.96198,-95.24301],[38.96198,-95.24396],[38.96186,-95.24395],[38.96198,-95.24401],[38.96198,-95.24419],[38.96212,-95.24419],[38.9621,-95.24436],[38.96201,-95.24435],[38.962,-95.24592],[38.9612,-95.24595],[38.95989,-95.24664],[38.9597,-95.24688],[38.95983,-95.2471],[38.9598,-95.24739],[38.95931,-95.24822],[38.95915,-95.24814],[38.95897,-95.24827],[38.95887,-95.24865],[38.95835,-95.24905],[38.9584,-95.2493],[38.95809,-95.24964],[38.95771,-95.24986],[38.95709,-95.25087],[38.95695,-95.25205],[38.95697,-95.2529],[38.95594,-95.25414],[38.95597,-95.25504],[38.95582,-95.25638],[38.9552,-95.25729],[38.95396,-95.25808],[38.95386,-95.25847],[38.95357,-95.25887],[38.95353,-95.25922],[38.95369,-95.25982],[38.95369,-95.26084],[38.95354,-95.26265],[38.95328,-95.26353],[38.95289,-95.26435],[38.95262,-95.26412],[38.95256,-95.26422],[38.95239,-95.2641]];

    var map = L.map(el, { scrollWheelZoom: false });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    var route = L.polyline(ROUTE, {
      color: '#333', weight: 4, opacity: 0.85, dashArray: '6 9'
    }).addTo(map).bindTooltip('Approx. walking route: 2.6 km, ~35 min');

    function poi(latlng, color, label, popupHtml, dir) {
      L.circleMarker(latlng, {
        radius: 11, color: '#fff', weight: 3, fillColor: color, fillOpacity: 1
      }).addTo(map)
        .bindTooltip(label, { permanent: true, direction: dir, className: 'iacap-poi-label' })
        .bindPopup(popupHtml);
    }

    poi(VENUE, '#E8000D', "Nichol's Hall",
      "<strong>Nichol's Hall</strong><br>Conference venue &middot; Center for Cybersocial Dynamics<br><a href='https://nichols.ku.edu/'>nichols.ku.edu</a>", 'right');
    poi(HOTEL, '#0051BA', 'The Oread',
      "<strong>The Oread Hotel</strong><br>1200 Oread Ave &middot; ~35 min walk to venue<br><a href='https://www.hilton.com/en/hotels/lwctoup-the-oread-lawrence/'>Hotel website</a>", 'left');

    map.fitBounds(route.getBounds(), { padding: [45, 45] });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', build);
  } else {
    build();
  }
})();
</script>

<style>
  .iacap-poi-label {
    font-weight: 700;
    font-size: 0.85rem;
    background: rgba(255, 255, 255, 0.92);
    border: 1px solid #999;
    color: #222;
  }
</style>
